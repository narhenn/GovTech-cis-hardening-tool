# CIS Benchmark rules for RHEL
# match_type: exact, contains, absent, regex

rules:
  # -- Filesystem --
  - id: "1.1.1.1"
    title: "Ensure cramfs kernel module is not available"
    description: "cramfs not needed, disable it"
    category: "filesystem"
    command: "modprobe -n -v cramfs 2>&1 | grep -v 'install /bin/true' | grep -v 'install /bin/false' || true"
    expected: ""
    match_type: "absent"
    remediation: "echo 'install cramfs /bin/false' >> /etc/modprobe.d/cramfs.conf"

  - id: "1.1.1.2"
    title: "Ensure freevxfs kernel module is not available"
    description: "freevxfs not needed"
    category: "filesystem"
    command: "modprobe -n -v freevxfs 2>&1 | grep -v 'install /bin/true' | grep -v 'install /bin/false' || true"
    expected: ""
    match_type: "absent"
    remediation: "echo 'install freevxfs /bin/false' >> /etc/modprobe.d/freevxfs.conf"

  - id: "1.1.1.3"
    title: "Ensure hfs kernel module is not available"
    category: "filesystem"
    command: "modprobe -n -v hfs 2>&1 | grep -v 'install /bin/true' | grep -v 'install /bin/false' || true"
    expected: ""
    match_type: "absent"
    remediation: "echo 'install hfs /bin/false' >> /etc/modprobe.d/hfs.conf"

  - id: "1.4.1"
    title: "Ensure permissions on bootloader config are configured"
    description: "grub config should be root-only"
    category: "filesystem"
    command: "stat -c '%a %u %g' /boot/grub2/grub.cfg 2>/dev/null || stat -c '%a %u %g' /boot/grub2/grubenv 2>/dev/null || echo 'not found'"
    expected: "600 0 0"
    match_type: "contains"
    remediation: "chmod 600 /boot/grub2/grub.cfg && chown root:root /boot/grub2/grub.cfg"

  # -- Network --
  - id: "3.1.1"
    title: "Ensure IP forwarding is disabled"
    description: "should be off unless this is a router"
    category: "network"
    command: "sysctl net.ipv4.ip_forward 2>/dev/null"
    expected: "net.ipv4.ip_forward = 0"
    match_type: "exact"
    remediation: "sysctl -w net.ipv4.ip_forward=0"

  - id: "3.1.2"
    title: "Ensure packet redirect sending is disabled"
    category: "network"
    command: "sysctl net.ipv4.conf.all.send_redirects 2>/dev/null"
    expected: "net.ipv4.conf.all.send_redirects = 0"
    match_type: "exact"
    remediation: "sysctl -w net.ipv4.conf.all.send_redirects=0"

  # -- Audit/Logging --
  - id: "4.1.1.1"
    title: "Ensure auditd is installed"
    category: "audit"
    command: "rpm -q audit audit-libs 2>/dev/null"
    expected: "audit-"
    match_type: "contains"
    remediation: "yum install -y audit audit-libs"

  - id: "4.1.1.2"
    title: "Ensure auditd service is enabled and active"
    description: "auditd needs to be running to log security events"
    category: "audit"
    command: "systemctl is-enabled auditd 2>/dev/null"
    expected: "enabled"
    match_type: "exact"
    remediation: "systemctl enable --now auditd"

  - id: "4.2.1.1"
    title: "Ensure rsyslog is installed"
    category: "audit"
    command: "rpm -q rsyslog 2>/dev/null"
    expected: "rsyslog-"
    match_type: "contains"
    remediation: "yum install -y rsyslog"

  # -- SSH --
  - id: "5.2.1"
    title: "Ensure permissions on /etc/ssh/sshd_config are configured"
    category: "ssh"
    command: "stat -c '%a %u %g' /etc/ssh/sshd_config 2>/dev/null"
    expected: "600 0 0"
    match_type: "exact"
    remediation: "chmod 600 /etc/ssh/sshd_config && chown root:root /etc/ssh/sshd_config"

  - id: "5.2.4"
    title: "Ensure SSH access is limited"
    description: "there should be AllowUsers or AllowGroups set"
    category: "ssh"
    command: "sshd -T 2>/dev/null | grep -i 'allowusers\\|allowgroups\\|denyusers\\|denygroups' || echo 'none'"
    expected: "allow"
    match_type: "contains"
    remediation: "Add AllowUsers or AllowGroups directive to /etc/ssh/sshd_config"

  - id: "5.2.5"
    title: "Ensure SSH LogLevel is set to INFO or VERBOSE"
    category: "ssh"
    command: "sshd -T 2>/dev/null | grep -i loglevel"
    expected: "loglevel INFO"
    match_type: "contains"
    remediation: "Set LogLevel INFO in /etc/ssh/sshd_config"

  - id: "5.2.11"
    title: "Ensure SSH PermitRootLogin is disabled"
    description: "no root login over ssh, use individual accounts"
    category: "ssh"
    command: "sshd -T 2>/dev/null | grep -i permitrootlogin"
    expected: "permitrootlogin no"
    match_type: "contains"
    remediation: "Set PermitRootLogin no in /etc/ssh/sshd_config"

  - id: "5.2.13"
    title: "Ensure SSH MaxAuthTries is set to 4 or less"
    category: "ssh"
    command: "sshd -T 2>/dev/null | grep -i maxauthtries"
    expected: "maxauthtries 4"
    match_type: "contains"
    remediation: "Set MaxAuthTries 4 in /etc/ssh/sshd_config"

  # -- Password Policy --
  - id: "5.4.1.1"
    title: "Ensure password expiration is 365 days or less"
    category: "password"
    command: "grep ^PASS_MAX_DAYS /etc/login.defs 2>/dev/null"
    expected: "PASS_MAX_DAYS"
    match_type: "contains"
    remediation: "Set PASS_MAX_DAYS 365 in /etc/login.defs"

  - id: "5.4.1.2"
    title: "Ensure minimum days between password changes is 7 or more"
    category: "password"
    command: "grep ^PASS_MIN_DAYS /etc/login.defs 2>/dev/null"
    expected: "PASS_MIN_DAYS"
    match_type: "contains"
    remediation: "Set PASS_MIN_DAYS 7 in /etc/login.defs"

  # -- System Maintenance --
  - id: "6.1.1"
    title: "Ensure permissions on /etc/passwd are configured"
    category: "maintenance"
    command: "stat -c '%a %u %g' /etc/passwd 2>/dev/null"
    expected: "644 0 0"
    match_type: "exact"
    remediation: "chmod 644 /etc/passwd && chown root:root /etc/passwd"

  - id: "6.1.2"
    title: "Ensure permissions on /etc/shadow are configured"
    category: "maintenance"
    command: "stat -c '%a %u %g' /etc/shadow 2>/dev/null"
    expected: "0 0 0"
    match_type: "exact"
    remediation: "chmod 000 /etc/shadow && chown root:root /etc/shadow"

  - id: "6.2.1"
    title: "Ensure no duplicate UIDs exist"
    category: "maintenance"
    command: "awk -F: '{print $3}' /etc/passwd | sort | uniq -d"
    expected: ""
    match_type: "absent"
    remediation: "Review /etc/passwd and resolve duplicate UIDs manually"
